services:
  gameplan:
    build: .
    image: gameplan:latest
    container_name: gameplan
    ports:
      - "8000:8000"
    volumes:
      - gameplan_data:/app/data
    environment:
      - SECRET_KEY=change-me-to-a-random-string
      - DEEPSEEK_API_KEY=sk-your-deepseek-key
      - LLM_ENABLED=true
    restart: unless-stopped

volumes:
  gameplan_data:
