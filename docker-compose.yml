services:
  gameplan:
    build: .
    container_name: gameplan
    ports:
      - "8000:8000"
    volumes:
      # SQLite 数据库持久化
      - ./data:/app/backend/data
      # Steam 游戏封面图片持久化
      - ./images:/app/backend/static/images
    environment:
      # 必须覆盖的敏感配置
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      # 可选配置
      - LLM_ENABLED=${LLM_ENABLED:-true}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - SESSION_DAYS=${SESSION_DAYS:-7}
      # 数据库路径（映射到持久化卷）
      - DATABASE_URL=sqlite:////app/backend/data/gameplan.db
    restart: unless-stopped
